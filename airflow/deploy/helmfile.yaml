repositories:
  - name: apache-airflow
    url: https://airflow.apache.org

releases:
  - name: airflow
    namespace: airflow
    chart: apache-airflow/airflow
    version: 1.11.0
    values:
      - ingress:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: nginx
          hosts:
            - host: airflow.rdx-works-main.extratools.works
              paths:
                - path: /
                  pathType: Prefix
    set:
