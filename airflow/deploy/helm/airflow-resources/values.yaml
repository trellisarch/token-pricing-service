# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

cluster_name: rdx-works-main-dev

alerts:
  enabled: true

image:
  repository: docker.io/radixdlt/airflow
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets:
  - name: docker-hub-dev
nameOverride: ""
fullnameOverride: ""

migrations:
  enableInitContainer: false

metrics:
  port: 1234
  enabled: false
  serviceMonitor:
    enabled: true
    interval: 5s
readinessProbe:
  initialDelaySeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  periodSeconds: 15
livenessProbe:
  initialDelaySeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5
  periodSeconds: 10

docker:
  secrets:
    region: eu-west-1
    name: docker.io/radixdlt

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    add:
    - NET_ADMIN
  privileged: false
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations:
affinity:
  podAffinity: {}
logging:
  LogLevel:
    Default: "Information"
    Microsoft_Hosting_Lifetime: "Information"

DisableCoreApiHttpsCertificateChecks: true

