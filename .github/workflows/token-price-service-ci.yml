name: CI token price service

on:
  push:
    branches:
      - main
    paths:
      - 'consumers/token-price-service/**'
      - 'deploy/helm/token-price/**'
      - ".github/workflows/console-ci.yaml"
  pull_request:
    branches:
      - main
    paths:
      - 'consumers/token-price-service/**'
      - 'deploy/helm/token-price/**'
      - ".github/workflows/console-ci.yaml"
  release:
    types: [published]

permissions:
  id-token: write
  pull-requests: write
  contents: read
  deployments: write
  packages: write

jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumers/token-price-service
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "consumers/token-price-service/app"

  tags:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      token-price-tags: ${{ steps.docker-tags-token-price-service.outputs.tags }}
      token-price-labels: ${{ steps.docker-tags-token-price-service.outputs.labels }}
      token-price-json: ${{ steps.docker-tags-token-price-service.outputs.json }}
    steps:
      - uses: actions/checkout@755da8c3cf115ac066823e79a1e1788f8940201b # v3.2.0
        with:
          fetch-depth: 0
      - name: Docker tags
        id: docker-tags-token-price-service
        uses: docker/metadata-action@57396166ad8aefe6098280995947635806a0e6ea
        with:
          images: |
            docker.io/radixdlt/token-price-service
          tags: |
            type=sha,event=pr
            type=sha,event=branch
            type=semver,pattern={{version}}

