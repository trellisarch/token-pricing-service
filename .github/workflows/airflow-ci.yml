name: Airflow Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  release:
    types: [published]
permissions:
  id-token: write
  pull-requests: write
  contents: read
  deployments: write
  packages: write
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "."

  tags:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      airflow-tags: ${{ steps.docker-tags-airflow-service.outputs.tags }}
      airflow-labels: ${{ steps.docker-tags-airflow-service.outputs.labels }}
      airflow-json: ${{ steps.docker-tags-airflow-service.outputs.json }}
    steps:
      - uses: actions/checkout@755da8c3cf115ac066823e79a1e1788f8940201b # v3.2.0
        with:
          fetch-depth: 0
      - name: Docker tags
        id: docker-tags-airflow-service
        uses: docker/metadata-action@57396166ad8aefe6098280995947635806a0e6ea
        with:
          images: |
            docker.io/radixdlt/airflow-service
          tags: |
            type=sha,event=pr
            type=sha,event=branch
            type=semver,pattern={{version}}

  build-airflow:
    needs: 
      - tags
    runs-on: ubuntu-latest
    steps:
      - uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
        with:
          image_registry: "docker.io"
          image_organization: "radixdlt"
          image_name: "airflow"
          tags: |
              type=sha,event=pr
              type=sha,event=branch
              type=semver,pattern={{version}}
          context: "airflow"
          dockerfile: "airflow/Dockerfile"
          platforms: "linux/amd64"
          provenance: "false"
          scan_image: false
          snyk_target_ref: ${{ github.ref_name }}
        secrets:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          role_to_assume: ${{ secrets.DOCKERHUB_RELEASER_ROLE }}

  build-token-service:
    needs: 
      - tags
    runs-on: ubuntu-latest
    steps:
      - uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
        with:
          image_registry: "docker.io"
          image_organization: "radixdlt"
          image_name: "token-price-service"
          tags: |
              type=sha,event=pr
              type=sha,event=branch
              type=semver,pattern={{version}}
          context: "consumers/token-price-service"
          dockerfile: "consumers/token-price-service/Dockerfile"
          platforms: "linux/amd64"
          provenance: "false"
          scan_image: false
          snyk_target_ref: ${{ github.ref_name }}
        secrets:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          role_to_assume: ${{ secrets.DOCKERHUB_RELEASER_ROLE }}

  build-airflow-migrations:
    needs: 
      - tags
    runs-on: ubuntu-latest
    steps:
      - uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
        with:
          image_registry: "docker.io"
          image_organization: "radixdlt"
          image_name: "airflow-migration"
          tags: |
              type=sha,event=pr
              type=sha,event=branch
              type=semver,pattern={{version}}
          context: "database"
          dockerfile: "database/Dockerfile"
          platforms: "linux/amd64"
          provenance: "false"
          scan_image: false
          snyk_target_ref: ${{ github.ref_name }}
        secrets:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          role_to_assume: ${{ secrets.DOCKERHUB_RELEASER_ROLE }}

  deploy-airflow-dev:
    name: "Deploy airflow dev"
    if:  github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
      deployments: write
    needs:
      - tags
      - build-airflow
      - build-airflow-migrations
      - build-token-service
    steps:
      - uses: RDXWorks-actions/checkout@main
      - uses: radixdlt/public-iac-resuable-artifacts/fetch-secrets@main
        with:
          role_name: ${{ secrets.AWS_ROLE_NAME_AIRFLOW_SECRETS }}
          app_name: 'airflow'
          step_name: 'airflow-webserver-secrets'
          secret_prefix: 'AIRFLOW'
          secret_name: ${{ secrets.AWS_AIRFLOW_DEV_SECRET_ARN }}
          parse_json: true
      - uses: radixdlt/iac-resuable-artifacts/.github/workflows/deploy.yml@v0.15.0
        with:
          app_name: 'airflow'
          step_name: 'deploy-airflow-dev'
          env_name: dev
          namespace: airflow-dev
          helm_command: "apply"
          create_subns: false
          restart_pods: false
          aws_region: eu-west-2
          role_to_assume: arn:aws:iam::308190735829:role/gh-airflow-dev-deployer
          eks_cluster: rdx-works-main-dev
          helm_folder: "deploy/helm/airflow"
          helmfile_extra_vars: >-
            ci.tag=${{ fromJSON(needs.tags.outputs.airflow-json).labels['org.opencontainers.image.version'] }},
            ci.environment=dev,
            ci.HF_CREATE_NAMESPACES=false,
            ci.INSTALL_DB=${{ false }},
            ci.INSTALL_AIRFLOW=${{ true }},
            ci.INSTALL_TOKEN_SERVICE=${{ true }},
            ci.AIRFLOW_IMAGE_TAG=${{ fromJSON(needs.tags.outputs.airflow-json).labels['org.opencontainers.image.version'] }},
            ci.AIRFLOW_MIGRATION_IMAGE_TAG=${{ fromJSON(needs.tags.outputs.airflow-json).labels['org.opencontainers.image.version'] }},
            ci.AIRFLOW_WEBSERVER_USERNAME=${{ env.AIRFLOW_WEBSERVER_USERNAME }},
