name: CI airflow

on:
  push:
    paths:
      - 'airflow/**'

permissions:
  id-token: write
  pull-requests: write
  contents: read
  deployments: write
  packages: write

jobs:

  tags:
    runs-on: ubuntu-latest
    outputs:
      token-price-tags: ${{ steps.docker-tags-token-price-service.outputs.tags }}
      token-price-labels: ${{ steps.docker-tags-token-price-service.outputs.labels }}
      token-price-json: ${{ steps.docker-tags-token-price-service.outputs.json }}
    steps:
      - uses: actions/checkout@755da8c3cf115ac066823e79a1e1788f8940201b # v3.2.0
        with:
          fetch-depth: 0
      - name: Docker tags
        id: docker-tags-token-price-service
        uses: docker/metadata-action@57396166ad8aefe6098280995947635806a0e6ea
        with:
          images: |
            docker.io/radixdlt/token-price-service
          tags: |
            type=sha,event=pr
            type=sha,event=branch
            type=semver,pattern={{version}}


  build:
    needs: 
    - tags
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
    with:
      runs_on: ubuntu-latest
      image_registry: "docker.io"
      image_organization: "radixdlt"
      image_name: "airflow"
      tags: |
          type=sha,event=pr
          type=sha,event=branch
          type=semver,pattern={{version}}
      context: "airflow"
      dockerfile: "airflow/Dockerfile"
      platforms: "linux/amd64"
      provenance: "false"
      scan_image: false
      snyk_target_ref: ${{ github.ref_name }}
    secrets:
      workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
      service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      role_to_assume: ${{ secrets.DOCKERHUB_RELEASER_ROLE }}

##TODO: modify vars
  deploy-dev:
    if:  github.ref == 'refs/heads/develop'
    uses: radixdlt/iac-resuable-artifacts/.github/workflows/deploy.yml@v0.13.0
    needs:
      - build
    with:
      app_name: airflow
      step_name: airflow-dev
      env_name: dev
      namespace: airflow-dev
      create_subns: false
      aws_region: eu-west-2
      role_to_assume: arn:aws:iam::123730156073:role/gh-instabridge2-dev-deployer
      eks_cluster: rdx-works-main-dev
      helmfile_extra_vars: >-
        ci.tag=${{ needs.setup-tags.outputs.instabridge-tag }},
        ci.environment=dev,
        ci.HF_CREATE_NAMESPACES=false,
        ci.useLocalDb=false