name: CI airflow

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  release:
    types: [published]
permissions:
  id-token: write
  pull-requests: write
  contents: read
  deployments: write
  packages: write
jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumers/airflow-service
    steps:
      - uses: actions/checkout@v3
      # - uses: psf/black@stable
      #   with:
      #     options: "--check --verbose"
      #     src: "consumers/airflow-service/app"

  build-airflow:
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
    with:
      runs_on: ubuntu-latest
      image_registry: "docker.io"
      image_organization: "radixdlt"
      image_name: "airflow"
      tags: |
          type=sha,event=pr
          type=sha,event=branch
          type=semver,pattern={{version}}
      context: "airflow"
      dockerfile: "airflow/Dockerfile"
      platforms: "linux/amd64"
      provenance: "false"
      scan_image: false
      snyk_target_ref: ${{ github.ref_name }}
    secrets:
      workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
      service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      role_to_assume: ${{ secrets.DOCKERHUB_RELEASER_ROLE }}

  build-airflow-migrations:
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
    with:
      runs_on: ubuntu-latest
      image_registry: "docker.io"
      image_organization: "radixdlt"
      image_name: "airflow-migration"
      tags: |
          type=sha,event=pr
          type=sha,event=branch
          type=semver,pattern={{version}}
      context: "database"
      dockerfile: "database/Dockerfile"
      platforms: "linux/amd64"
      provenance: "false"
      scan_image: false
      snyk_target_ref: ${{ github.ref_name }}
    secrets:
      workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
      service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      role_to_assume: ${{ secrets.DOCKERHUB_RELEASER_ROLE }}

  deploy-airflow-dev:
    if:  github.ref == 'refs/heads/develop'
    uses: radixdlt/iac-resuable-artifacts/.github/workflows/deploy.yml@v0.15.0
    needs:
      - build-airflow
      - build-airflow-migrations
    with:
      app_name: 'airflow'
      step_name: 'deploy-airflow-dev'
      env_name: dev
      namespace: airflow-dev
      helm_command: "apply"
      create_subns: false
      restart_pods: false
      aws_region: eu-west-2
      role_to_assume: arn:aws:iam::308190735829:role/gh-airflow-dev-deployer
      eks_cluster: rdx-works-main-dev
      helm_folder: "airflow/deploy/helm"
      helmfile_extra_vars: >-
        ci.tag=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.environment=dev,
        ci.HF_CREATE_NAMESPACES=false,
        ci.AIRFLOW_IMAGE_TAG=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.AIRFLOW_MIGRATION_IMAGE_TAG=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.onlyDB=false,
        ci.useLocalDb=false

## Only deploys in case deploy-db label is tagged
  deploy_pull_request_only_db:
    if: ${{ github.event.label.name == 'deploy-db' }}
    name: "Deploy PR only DB"
    uses: radixdlt/iac-resuable-artifacts/.github/workflows/deploy.yml@v0.15.0
    needs:
      - build-airflow
      - build-airflow-migrations
    with:
      env_name: pr
      hierarchical_namespace: airflow-ci-pr
      namespace: airflow-pr-${{ github.event.number }}
      helm_command: "apply"
      create_subns: true
      restart_pods: false
      aws_region: eu-west-2
      role_to_assume: 'arn:aws:iam::308190735829:role/gh-airflow-pr-deployer'
      eks_cluster: rdx-works-main-dev
      helm_folder: "airflow/deploy/helm"
      helmfile_extra_vars: >-
        ci.tag=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.prNumber=${{ github.event.number }},
        ci.AIRFLOW_IMAGE_TAG=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.AIRFLOW_MIGRATION_IMAGE_TAG=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.onlyDB=true,
        ci.useLocalDb=true
      app_name: 'airflow'
      step_name: 'deploy-pr'

## Only deploys in case deploy-airflow label is tagged
  deploy_pull_request_airflow:
    if: contains(github.event.pull_request.labels.*.name, 'deploy-airflow')
    name: "Deploy PR airflow"
    uses: radixdlt/iac-resuable-artifacts/.github/workflows/deploy.yml@v0.15.0
    needs:
      - build-airflow
      - build-airflow-migrations
    with:
      env_name: pr
      hierarchical_namespace: airflow-ci-pr
      namespace: airflow-pr-${{ github.event.number }}
      helm_command: "apply"
      create_subns: true
      restart_pods: false
      aws_region: eu-west-2
      role_to_assume: 'arn:aws:iam::308190735829:role/gh-airflow-pr-deployer'
      eks_cluster: rdx-works-main-dev
      helm_folder: "airflow/deploy/helm"
      helmfile_extra_vars: >-
        ci.tag=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.prNumber=${{ github.event.number }},
        ci.AIRFLOW_IMAGE_TAG=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.AIRFLOW_MIGRATION_IMAGE_TAG=${{ fromJSON(needs.build-airflow.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.onlyDB=false,
        ci.useLocalDb=true
      app_name: 'airflow'
      step_name: 'deploy-pr'
