version: "3.7"

services:
  app:
    build:
      context: .
    entrypoint: uvicorn app.main:app --workers 4 --host 0.0.0.0 --port 8000 --log-level info --reload
    environment:
      DB_PASSWORD: postgres
    ports:
      - 8000:8000
      - 5990:5990
    volumes:
      - ./app/:/app
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    volumes:
      - ./sample_data/data_dump.sql:/docker-entrypoint-initdb.d/data_dump.sql
    ports:
      - 5432:5432
