helmDefaults:
  verify: false
  wait: true
  timeout: 600
  recreatePods: false
  force: false
  createNamespace: false

repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: stable
    url: https://charts.helm.sh/stable
  - name: rdx-works
    url: https://raw.githubusercontent.com/radixdlt/helm-charts/master/
    username: {{ requiredEnv "HELM_GH_USER" }}
    password: {{ requiredEnv "HELM_GH_PASS" }}
  - name: apache-airflow
    url: https://airflow.apache.org
environments:
  default: {}
  dev: {}
  pr: {}
  prod: {}
releases:
  - name: airflow-resources
    installed: {{ .StateValues | get "ci.INSTALL_AIRFLOW" "false" }}
    chart: ./airflow-resources
    values:
      - environments/{{ .Environment.Name }}/values.yaml.gotmpl
      - environments/{{ .Environment.Name }}/secrets.yaml.gotmpl
  - name: airflow
    installed: {{ .StateValues | get "ci.INSTALL_AIRFLOW" "false" }}
    chart: apache-airflow/airflow
    version: 1.11.0
    values:
      - airflowVersion: "2.8.1"
      - images:
          airflow:
            repository: radixdlt/airflow
            tag: {{ .StateValues.ci.AIRFLOW_IMAGE_TAG }}
      - environments/{{ .Environment.Name }}/values.yaml.gotmpl
      - environments/{{ .Environment.Name }}/secrets.yaml.gotmpl
    set:
  - name: token-price
    installed: {{ .StateValues | get "ci.INSTALL_TOKEN_SERVICE" "false" }}
    chart: ./token-price
    values:
      - environments/{{ .Environment.Name }}/token-price-values.yaml.gotmpl

  - name: postgres
    chart: bitnami/postgresql
    installed: {{ .StateValues | get "ci.INSTALL_DB" "false" }}
    version: 12.1.5
    values:
      - auth:
          postgresPassword: secret@123
          database: "token-price"
      - primary:
          persistence:
            enabled: false

  - name: alertmanager
    chart: rdx-works/alertmanager-configs
    version: 1.1.0
    installed: {{ ne .Environment.Name "pr" }}
    values:
      - environments/{{ .Environment.Name }}/alertmanager.yaml.gotmpl

  - name: developer-access
    chart: rdx-works/developer-access
    version: 1.0.0
    values:
      - project: token-price
      - environments/{{ .Environment.Name }}/developer-access.yaml.gotmpl
