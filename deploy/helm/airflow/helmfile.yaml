environments:
  default: {}
  dev: {}
  pr: {}
  prod: {}
---
helmDefaults:
  verify: false
  wait: false
  timeout: 180
  recreatePods: false
  force: false
  createNamespace: false

repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: stable
    url: https://charts.helm.sh/stable
  - name: rdx-works
    url: https://raw.githubusercontent.com/radixdlt/helm-charts/master/
    username: {{ requiredEnv "HELM_GH_USER" }}
    password: {{ requiredEnv "HELM_GH_PASS" }}
  - name: apache-airflow
    url: https://airflow.apache.org
releases:
  - name: airflow-resources
    installed: {{ .StateValues | get "ci.INSTALL_AIRFLOW" "false" }}
    chart: ./airflow-resources
    values:
      - environments/{{ .Environment.Name }}/values.yaml.gotmpl
      - environments/{{ .Environment.Name }}/secrets.yaml.gotmpl

  - name: airflow
    installed: {{ .StateValues | get "ci.INSTALL_AIRFLOW" "false" }}
    chart: apache-airflow/airflow
    version: 1.14.0
    values:
      # airflowVersion must match image tag version in airflow/Dockerfile
      - airflowVersion: "2.9.3"
      - images:
          airflow:
            repository: {{ .StateValues.ci.ecr_registry }}/airflow
            tag: {{ .StateValues.ci.tag }}
      # Add PostgreSQL image configuration here
      - postgresql:
          image:
            registry: public.ecr.aws
            repository: u2o0d2a1/bitnami-postgresql
            tag: 15.4.0-debian-11-r56
      - webserver:
          args: ["bash", "-c", "exec airflow webserver"]
      - environments/{{ .Environment.Name }}/statsd-override-mappings.yaml.gotmpl
      - environments/{{ .Environment.Name }}/values.yaml.gotmpl
      - environments/{{ .Environment.Name }}/secrets.yaml.gotmpl
    needs:
      - airflow-resources
      
  - name: token-price
    installed: {{ .StateValues | get "ci.INSTALL_TOKEN_SERVICE" "false" }}
    chart: ./token-price
    values:
      - environments/{{ .Environment.Name }}/token-price-values.yaml.gotmpl

  - name: db-migrations
    installed: {{ .StateValues | get "ci.RUN_DB_MIGRATIONS" "false" }}
    chart: ./db-migrations
    values:
      - environments/{{ .Environment.Name }}/db-migrations.yaml.gotmpl

  - name: postgres
    chart: bitnami/postgresql
    installed: {{ .StateValues | get "ci.INSTALL_DB" "false" }}
    version: 12.12.10
    values:
      - auth:
          postgresPassword: postgres
          database: "dags"
      - image:
          registry: public.ecr.aws
          repository: u2o0d2a1/bitnami-postgresql
          tag: 15.4.0-debian-11-r56
      - primary:
          persistence:
            enabled: false

  - name: alertmanager
    chart: rdx-works/alertmanager-configs
    version: 1.1.0
    installed: {{ ne .Environment.Name "pr" }}
    values:
      - environments/{{ .Environment.Name }}/alertmanager.yaml.gotmpl

  - name: developer-access
    chart: rdx-works/developer-access
    version: 1.0.0
    values:
      - project: token-price
      - environments/{{ .Environment.Name }}/developer-access.yaml.gotmpl

